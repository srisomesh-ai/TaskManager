<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Price List — BharatGPS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#0E5C5C;--accent2:#137272;--accent-light:#E0EEEE;
  --green:#27AE60;--green-bg:#e8f5ec;
  --red:#E74C3C;--red-bg:#FCE9E7;
  --amber:#F5A623;--amber-bg:#FDF1DE;
  --blue:#2E86DE;--blue-bg:#E7F1FC;
  --purple:#6C5CE7;--purple-bg:#F0F0FB;
  --text:#16201F;--text2:#55676A;--text3:#8A9A98;
  --surface:#fff;--surface2:#F3F6F5;--border:#D9E2E0;--line:#E9EFEE;
  --shadow:0 2px 8px rgba(14,92,92,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#EFF3F2;color:var(--text);min-height:100vh}


/* CONTENT */
.content{padding:20px 22px}

/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.stat-val{font-size:26px;font-weight:900;color:var(--text);line-height:1}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.search-input{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:var(--surface);outline:none;min-width:200px}
.search-input:focus{border-color:var(--accent)}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* TABLE */
.table-card{background:var(--surface);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);text-align:left;border-bottom:1px solid var(--line);background:var(--surface2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.num{text-align:right;font-family:monospace;font-weight:700}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hd{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--surface)}
.modal-hd-title{flex:1;font-size:15px;font-weight:800;color:var(--text)}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;font-size:16px;color:var(--text3)}
.modal-body{padding:18px 20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:var(--surface);outline:none}
.form-input:focus{border-color:var(--accent)}
.form-grid{display:grid;gap:12px}
.form-grid-2{grid-template-columns:1fr 1fr}
.full{grid-column:1/-1}

/* GST RESULT */
.gst-result{background:var(--accent-light);border-radius:8px;padding:12px 14px;font-size:20px;font-weight:900;color:var(--accent)}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#16201F;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* PAGE HEADER */
.pg-hd{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding-top:2px}
.pg-title{font-size:21px;font-weight:900;color:var(--text)}
.pg-sub{font-size:12px;color:var(--text3);margin-top:2px}
</style>
</head>
<body>


<div class="content">

  <div class="pg-hd">
    <div>
      <div class="pg-title">💲 Price List</div>
      <div class="pg-sub">All GPS services and devices with pricing — admin access only</div>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Add Item</button>
  </div>

  <!-- Stat cards -->
  <div class="stat-row">
    <div class="stat-card" style="border-bottom:3px solid var(--accent)">
      <div class="stat-val" id="st-total">–</div>
      <div class="stat-lbl">Total Items</div>
    </div>
    <div class="stat-card" style="border-bottom:3px solid var(--green)">
      <div class="stat-val" id="st-active">–</div>
      <div class="stat-lbl">Active Items</div>
    </div>
    <div class="stat-card" style="border-bottom:3px solid var(--blue)">
      <div class="stat-val" id="st-min">–</div>
      <div class="stat-lbl">Min Price (excl GST)</div>
    </div>
    <div class="stat-card" style="border-bottom:3px solid var(--amber)">
      <div class="stat-val" id="st-max">–</div>
      <div class="stat-lbl">Max Price (excl GST)</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input class="search-input" id="pl-search" placeholder="🔍 Search product, server…" oninput="render()">
    <select class="search-input" id="pl-cat" onchange="render()" style="min-width:auto">
      <option value="">All Categories</option>
      <option>GPS Device</option>
      <option>VLTD</option>
      <option>Renewal</option>
      <option>Accessory</option>
      <option>Service</option>
    </select>
    <select class="search-input" id="pl-status" onchange="render()" style="min-width:auto">
      <option value="">All Status</option>
      <option value="1">Active</option>
      <option value="0">Inactive</option>
    </select>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Product / Service</th>
            <th>Category</th>
            <th>Server</th>
            <th class="num">Price (excl GST) ₹</th>
            <th style="text-align:center">GST %</th>
            <th class="num">Price (incl GST) ₹</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="pl-tbody">
          <tr><td colspan="9" style="padding:40px;text-align:center;color:var(--text3)">⏳ Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div><!-- /content -->

<!-- MODAL -->
<div class="overlay" id="pl-overlay">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-hd-title" id="modal-title">Add Price Item</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid form-grid-2">
        <div class="form-group full">
          <label class="form-label">Product / Service Name <span style="color:var(--red)">*</span></label>
          <input class="form-input" id="m-name" placeholder="e.g. Basic/Normal GPS">
        </div>
        <div class="form-group">
          <label class="form-label">Category <span style="color:var(--red)">*</span></label>
          <select class="form-input" id="m-cat">
            <option>GPS Device</option>
            <option>VLTD</option>
            <option>Renewal</option>
            <option>Accessory</option>
            <option>Service</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Server Name</label>
          <input class="form-input" id="m-server" placeholder="e.g. BharatGPS Server">
        </div>
        <div class="form-group full">
          <label class="form-label">Description</label>
          <input class="form-input" id="m-desc" placeholder="Brief description">
        </div>
        <div class="form-group">
          <label class="form-label">Price (excl GST) ₹ <span style="color:var(--red)">*</span></label>
          <input class="form-input" id="m-price" type="number" min="0" step="0.01" placeholder="0.00" oninput="calcGst()">
        </div>
        <div class="form-group">
          <label class="form-label">GST %</label>
          <select class="form-input" id="m-gst" onchange="calcGst()">
            <option value="0">0% (Exempt)</option>
            <option value="5">5%</option>
            <option value="12">12%</option>
            <option value="18" selected>18%</option>
            <option value="28">28%</option>
          </select>
        </div>
        <div class="form-group full">
          <label class="form-label">Price (incl GST) ₹</label>
          <div class="gst-result" id="m-incl-display">₹ 0.00</div>
        </div>
        <div class="form-group">
          <label class="form-label">Sort Order</label>
          <input class="form-input" id="m-sort" type="number" min="0" value="0">
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-input" id="m-active">
            <option value="1">✅ Active</option>
            <option value="0">❌ Inactive</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="m-save-btn" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'api/index.php';

// ── AUTH ─────────────────────────────────────────────────────────────
const AUTH_TOKEN = (function(){
  var params = new URLSearchParams(window.location.search);
  var t = params.get('token');
  return t || localStorage.getItem('bgps_token') || '';
})();

const CURR_USER = (function(){
  try {
    var raw = localStorage.getItem('bgps_user');
    return raw ? JSON.parse(raw) : null;
  } catch(e){ return null; }
})();

// Admin-only: redirect if not admin
(function guard(){
  if(!AUTH_TOKEN || !CURR_USER || CURR_USER.role !== 'admin'){
    window.location.href = 'index.html';
  }

})();

// ── API ───────────────────────────────────────────────────────────────
function plApi(action, method, body){
  var url = API + '?action=' + action;
  var opts = { method: method||'GET', cache:'no-store', headers:{'X-Auth-Token': AUTH_TOKEN} };
  if(method === 'POST' && body){ opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  return fetch(url, opts).then(function(r){ return r.json(); });
}

// ── DATA ──────────────────────────────────────────────────────────────
var _items = [];
var _editId = null;

// ── INIT ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){ load(); });

function load(){
  document.getElementById('pl-tbody').innerHTML = '<tr><td colspan="9" style="padding:40px;text-align:center;color:var(--text3)">⏳ Loading…</td></tr>';
  plApi('pl_get').then(function(d){
    if(d.error){
      document.getElementById('pl-tbody').innerHTML = '<tr><td colspan="9" style="padding:40px;text-align:center;color:var(--red)">❌ ' + d.error + '</td></tr>';
      return;
    }
    _items = d.items || [];
    render();
  }).catch(function(){ showToast('❌ Could not load price list'); });
}

// ── RENDER ────────────────────────────────────────────────────────────
var CAT_COLORS = {
  'GPS Device': 'background:#e8f0fb;color:#1a56a0',
  'VLTD':       'background:#f0eaf8;color:#5b2d8e',
  'Renewal':    'background:#e8f5ec;color:#1a7a3a',
  'Accessory':  'background:#FDF1DE;color:#7a4500',
  'Service':    'background:#FCE9E7;color:#E74C3C',
};

function render(){
  var search = (document.getElementById('pl-search').value || '').toLowerCase();
  var cat    = document.getElementById('pl-cat').value;
  var status = document.getElementById('pl-status').value;

  var filtered = _items.filter(function(i){
    return (!search || (i.product_name||'').toLowerCase().includes(search) || (i.server_name||'').toLowerCase().includes(search) || (i.description||'').toLowerCase().includes(search)) &&
           (!cat    || i.category === cat) &&
           (status === '' || String(i.is_active) === status);
  });

  // Stats
  var active = _items.filter(function(i){ return parseInt(i.is_active) === 1; });
  var prices = active.map(function(i){ return parseFloat(i.price_excl_gst || 0); });
  document.getElementById('st-total').textContent  = _items.length;
  document.getElementById('st-active').textContent = active.length;
  document.getElementById('st-min').textContent    = prices.length ? '₹' + Math.min.apply(null,prices).toLocaleString('en-IN') : '–';
  document.getElementById('st-max').textContent    = prices.length ? '₹' + Math.max.apply(null,prices).toLocaleString('en-IN') : '–';

  var tbody = document.getElementById('pl-tbody');
  if(!filtered.length){
    tbody.innerHTML = '<tr><td colspan="9" style="padding:40px;text-align:center;color:var(--text3)">No items found</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(function(i, idx){
    var excl   = parseFloat(i.price_excl_gst || 0);
    var incl   = parseFloat(i.price_incl_gst || 0);
    var gst    = parseFloat(i.gst_percent || 0);
    var isAct  = parseInt(i.is_active) === 1;
    var badge  = CAT_COLORS[i.category] || 'background:var(--surface2);color:var(--text2)';
    return '<tr style="' + (isAct ? '' : 'opacity:.5') + '">' +
      '<td style="color:var(--text3);font-size:11px">' + (idx+1) + '</td>' +
      '<td><strong>' + esc(i.product_name) + '</strong>' + (i.description ? '<br><span style="font-size:11px;color:var(--text3)">' + esc(i.description) + '</span>' : '') + '</td>' +
      '<td><span class="badge" style="' + badge + '">' + esc(i.category) + '</span></td>' +
      '<td style="font-size:12px;color:var(--text2)">' + esc(i.server_name || '–') + '</td>' +
      '<td class="num">₹' + excl.toLocaleString('en-IN', {minimumFractionDigits:2}) + '</td>' +
      '<td style="text-align:center;color:var(--text2)">' + gst + '%</td>' +
      '<td class="num" style="color:var(--accent);font-weight:900">₹' + incl.toLocaleString('en-IN', {minimumFractionDigits:2}) + '</td>' +
      '<td>' + (isAct ? '<span class="badge" style="background:var(--green-bg);color:var(--green)">✅ Active</span>' : '<span class="badge" style="background:var(--surface2);color:var(--text3)">Inactive</span>') + '</td>' +
      '<td><div style="display:flex;gap:6px">' +
        '<button onclick="openModal(' + i.id + ')" style="background:var(--surface2);border:none;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer">✏️</button>' +
        '<button onclick="deleteItem(' + i.id + ')" style="background:var(--red-bg);border:none;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;color:var(--red)">🗑️</button>' +
      '</div></td>' +
    '</tr>';
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────────
function openModal(id){
  _editId = id || null;
  var item = id ? _items.find(function(i){ return i.id == id; }) : null;
  document.getElementById('modal-title').textContent = item ? '✏️ Edit Price Item' : '➕ Add Price Item';
  document.getElementById('m-name').value   = item ? item.product_name : '';
  document.getElementById('m-cat').value    = item ? item.category     : 'GPS Device';
  document.getElementById('m-server').value = item ? (item.server_name || '') : 'BharatGPS Server';
  document.getElementById('m-desc').value   = item ? (item.description || '') : '';
  document.getElementById('m-price').value  = item ? item.price_excl_gst : '';
  document.getElementById('m-gst').value    = item ? String(item.gst_percent) : '18';
  document.getElementById('m-sort').value   = item ? item.sort_order : '0';
  document.getElementById('m-active').value = item ? String(item.is_active) : '1';
  calcGst();
  document.getElementById('pl-overlay').classList.add('open');
  document.getElementById('m-name').focus();
}

function closeModal(){
  document.getElementById('pl-overlay').classList.remove('open');
  _editId = null;
}

function calcGst(){
  var excl = parseFloat(document.getElementById('m-price').value || 0);
  var gst  = parseFloat(document.getElementById('m-gst').value || 0);
  var incl = excl * (1 + gst / 100);
  document.getElementById('m-incl-display').textContent = '₹ ' + incl.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function saveItem(){
  var name = document.getElementById('m-name').value.trim();
  if(!name){ showToast('⚠️ Product name required'); return; }
  var btn = document.getElementById('m-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  var wasEdit = !!_editId;
  plApi('pl_save', 'POST', {
    id:             _editId || 0,
    product_name:   name,
    category:       document.getElementById('m-cat').value,
    server_name:    document.getElementById('m-server').value.trim(),
    description:    document.getElementById('m-desc').value.trim(),
    price_excl_gst: parseFloat(document.getElementById('m-price').value) || 0,
    gst_percent:    parseFloat(document.getElementById('m-gst').value) || 18,
    sort_order:     parseInt(document.getElementById('m-sort').value) || 0,
    is_active:      parseInt(document.getElementById('m-active').value),
  }).then(function(d){
    btn.disabled = false; btn.textContent = 'Save';
    if(d.success){ closeModal(); showToast(wasEdit ? '✅ Item updated' : '✅ Item added'); load(); }
    else showToast('❌ ' + (d.error || 'Save failed'));
  }).catch(function(){ btn.disabled = false; btn.textContent = 'Save'; showToast('❌ Network error'); });
}

function deleteItem(id){
  var item = _items.find(function(i){ return i.id == id; });
  if(!item || !confirm('Delete "' + item.product_name + '"?')) return;
  plApi('pl_delete', 'POST', {id: id}).then(function(d){
    if(d.success){ showToast('🗑️ Deleted'); load(); }
    else showToast('❌ ' + (d.error || 'Delete failed'));
  }).catch(function(){ showToast('❌ Network error'); });
}

// ── HELPERS ───────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
</script>
</body>
</html>
