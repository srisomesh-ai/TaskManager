<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demo Report — BharatGPS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh}
.topbar{background:#0E5C5C;padding:14px 18px;display:flex;align-items:center;gap:12px}
.topbar a{color:rgba(255,255,255,.7);font-size:13px;text-decoration:none}
.topbar h1{color:#fff;font-size:16px;font-weight:800;flex:1}
.card{background:#fff;border-radius:12px;margin:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.task-info{background:#e8f5e9;border:1.5px solid #66bb6a;border-radius:8px;padding:12px 14px;margin-bottom:20px}
.task-info .tid{font-size:12px;font-weight:800;color:#2e7d32}
.task-info .tname{font-size:15px;font-weight:700;color:#1b5e20;margin-top:2px}
label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:5px;margin-top:14px}
label span{color:#e53935}
input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#0E5C5C}
textarea{resize:none}
.btn{width:100%;padding:14px;background:#0E5C5C;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;margin-top:20px}
.btn:disabled{background:#aaa;cursor:not-allowed}
.err{background:#fdecea;border:1.5px solid #e53935;border-radius:8px;padding:10px 14px;color:#c62828;font-size:13px;font-weight:600;margin-top:12px;display:none}
.success{background:#e8f5e9;border:1.5px solid #66bb6a;border-radius:8px;padding:16px;color:#2e7d32;font-size:14px;font-weight:700;text-align:center;display:none}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
</style>
</head>
<body>

<div class="topbar">
  <a href="javascript:history.back()">← Back</a>
  <h1>📱 Demonstration Report</h1>
</div>

<div id="loading" class="loading">⏳ Loading task...</div>

<div id="main" style="display:none">
  <div class="card">
    <div class="task-info">
      <div class="tid" id="task-id-display"></div>
      <div class="tname" id="task-name-display"></div>
    </div>

    <div id="success-msg" class="success">
      ✅ Demo report submitted successfully!<br>
      <span style="font-size:12px;font-weight:400;margin-top:4px;display:block">Admin will review and follow up with the customer.</span>
    </div>

    <div id="form-area">
      <label>Who attended? (Name & Designation) <span>*</span></label>
      <input id="f-attendee" type="text" placeholder="e.g. Ravi Kumar — Fleet Manager">

      <label>Products demonstrated <span>*</span></label>
      <input id="f-products" type="text" placeholder="e.g. Basic GPS, Engine Cut, VLTD">

      <label>Customer interest level <span>*</span></label>
      <select id="f-interest">
        <option value="">Select interest level…</option>
        <option value="high">🔥 High — Ready to buy</option>
        <option value="medium">👍 Medium — Considering</option>
        <option value="low">👎 Low — Not sure yet</option>
        <option value="none">❌ Not interested</option>
      </select>

      <label>Customer concerns / questions raised</label>
      <textarea id="f-concerns" rows="2" placeholder="What did the customer ask or say?"></textarea>

      <label>Follow-up date (if needed)</label>
      <input id="f-fudate" type="date">

      <label>Remarks</label>
      <textarea id="f-remarks" rows="2" placeholder="Any additional notes…"></textarea>

      <div id="err-msg" class="err"></div>

      <button id="submit-btn" class="btn" onclick="submitReport()">✅ Submit Demo Report</button>
    </div>
  </div>
</div>

<script>
var API      = '/api/index.php';
var taskId   = null;
var authToken= '';

// Get task ID from URL
var params = new URLSearchParams(location.search);
taskId = params.get('id') || params.get('task_id');

// Get auth token from localStorage
authToken = localStorage.getItem('bgps_tech_token') || localStorage.getItem('bgps_token') || '';

async function loadTask(){
  if(!taskId){ showError('No task ID in URL'); return; }
  if(!authToken){ location.href = 'tech.html'; return; }

  try{
    var r = await fetch(API + '?action=get_task&id=' + taskId, {
      headers:{'X-Auth-Token': authToken}
    });
    var d = await r.json();
    if(!d.task){ showError('Task not found'); return; }

    var t = d.task;
    document.getElementById('task-id-display').textContent  = t.task_id + ' — Demonstration';
    document.getElementById('task-name-display').textContent = t.customer_name + ' | ' + (t.location||'');

    // If already submitted — show done message
    if(t.task_status === 'Demo Done'){
      document.getElementById('form-area').style.display  = 'none';
      document.getElementById('success-msg').style.display = '';
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display    = '';
  } catch(e){
    showError('Network error. Please try again.');
  }
}

async function submitReport(){
  var btn = document.getElementById('submit-btn');
  var err = document.getElementById('err-msg');
  err.style.display = 'none';

  var attendee = document.getElementById('f-attendee').value.trim();
  var products = document.getElementById('f-products').value.trim();
  var interest = document.getElementById('f-interest').value;

  if(!attendee){ showValidationError('Please enter who attended the demo'); return; }
  if(!products){ showValidationError('Please enter products demonstrated'); return; }
  if(!interest){ showValidationError('Please select customer interest level'); return; }

  btn.disabled    = true;
  btn.textContent = '⏳ Submitting…';

  try{
    var payload = {
      task_id:    parseInt(taskId),
      job_type:   'demo',
      summary:    '📱 Demo Report',
      close_task: true,
      fields: {
        'Attendee':        attendee,
        'Products Demo':   products,
        'Interest Level':  interest,
        'Concerns Raised': document.getElementById('f-concerns').value.trim(),
        'Follow-up Date':  document.getElementById('f-fudate').value || 'No',
        'Remarks':         document.getElementById('f-remarks').value.trim()
      }
    };

    var r = await fetch(API + '?action=save_job_outcome', {
      method:  'POST',
      headers: {'Content-Type':'application/json','X-Auth-Token': authToken},
      body:    JSON.stringify(payload)
    });
    var d = await r.json();

    if(d.success){
      document.getElementById('form-area').style.display  = 'none';
      document.getElementById('success-msg').style.display = '';
      // Go back to tech page after 2 seconds
      setTimeout(function(){ location.href = 'tech.html'; }, 2000);
    } else {
      btn.disabled    = false;
      btn.textContent = '✅ Submit Demo Report';
      showValidationError(d.error || 'Failed — please try again');
    }
  } catch(e){
    btn.disabled    = false;
    btn.textContent = '✅ Submit Demo Report';
    showValidationError('Network error. Please try again.');
  }
}

function showValidationError(msg){
  var err = document.getElementById('err-msg');
  err.textContent  = '⚠️ ' + msg;
  err.style.display = '';
}

function showError(msg){
  document.getElementById('loading').textContent = '❌ ' + msg;
}

// Start
loadTask();
</script>
</body>
</html>
