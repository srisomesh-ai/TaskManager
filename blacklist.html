<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Blacklist — BharatGPS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#0E5C5C;--accent2:#137272;
  --red:#c0392b;--red-bg:#fdecea;
  --green:#1a7a3a;--green-bg:#e8f5ec;
  --amber:#e07b00;--amber-bg:#fff3e0;
  --text:#1a1f2e;--text2:#4a5568;--text3:#8a9ab0;
  --border:#e2e8f0;--surface:#fff;--surface2:#f7f8fa;
  --shadow:0 2px 10px rgba(0,0,0,.08);
}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:var(--text);padding:20px}
.pg-title{font-size:20px;font-weight:900;color:var(--text);margin-bottom:4px}
.pg-sub{font-size:13px;color:var(--text3);margin-bottom:20px}
.card{background:#fff;border-radius:12px;box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
/* toolbar */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);align-items:flex-end}
.tb-in,.tb-sel{padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;outline:none;background:#fff}
.tb-in:focus,.tb-sel:focus{border-color:var(--accent)}
.btn{padding:8px 16px;border:none;border-radius:7px;font-size:12px;font-weight:800;cursor:pointer}
.btn-red{background:var(--red);color:#fff}
.btn-accent{background:var(--accent);color:#fff}
.btn-sm{padding:6px 10px;font-size:11px}
/* table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--surface2);position:sticky;top:0}
th{padding:9px 12px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;color:var(--text3);white-space:nowrap;border-bottom:2px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover td{background:#f7f9fc}
.badge-active{background:var(--red-bg);color:var(--red);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;display:inline-block}
.badge-cleared{background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;display:inline-block}
.badge-auto{background:#f0eaf8;color:#5b2d8e;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700}
.badge-manual{background:var(--amber-bg);color:var(--amber);padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700}
/* add form */
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;outline:none}
.fg input:focus,.fg textarea:focus{border-color:var(--red)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px}
/* modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.modal-box{background:#fff;border-radius:12px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.modal-hd{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-close{background:var(--surface2);border:none;width:28px;height:28px;border-radius:5px;font-size:15px;cursor:pointer}
/* toast */
#bl-toast{position:fixed;bottom:20px;right:20px;background:#1a1f2e;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
#bl-toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<div class="pg-title">🚫 Blacklist</div>
<div class="pg-sub">Customers blocked from installation — auto-added on cancellation after consent</div>

<!-- Stats strip -->
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px" id="bl-stats">
  <div style="background:#fff;border-radius:10px;padding:14px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--red)">
    <div style="font-size:22px;font-weight:900;color:var(--red)" id="bl-stat-active">–</div>
    <div style="font-size:11px;color:var(--text3);font-weight:600">Active Blacklist</div>
  </div>
  <div style="background:#fff;border-radius:10px;padding:14px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--amber)">
    <div style="font-size:22px;font-weight:900;color:var(--amber)" id="bl-stat-auto">–</div>
    <div style="font-size:11px;color:var(--text3);font-weight:600">Auto-Added</div>
  </div>
  <div style="background:#fff;border-radius:10px;padding:14px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--green)">
    <div style="font-size:22px;font-weight:900;color:var(--green)" id="bl-stat-cleared">–</div>
    <div style="font-size:11px;color:var(--text3);font-weight:600">Cleared</div>
  </div>
</div>

<!-- Records -->
<div class="card">
  <div class="card-hd">
    <div class="card-title">🚫 Blacklisted Customers</div>
    <button class="btn btn-red btn-sm" onclick="openAddModal()">+ Add Manually</button>
  </div>
  <div class="toolbar">
    <input class="tb-in" id="bl-search" placeholder="🔍 Search name, phone, email…" oninput="loadBlacklist()" style="min-width:220px">
    <select class="tb-sel" id="bl-status" onchange="loadBlacklist()">
      <option value="active">Active</option>
      <option value="cleared">Cleared</option>
      <option value="all">All</option>
    </select>
    <button class="btn btn-accent btn-sm" onclick="loadBlacklist()">🔄 Refresh</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>#</th><th>Customer</th><th>Phone</th><th>Email</th>
        <th>Task</th><th>Reason</th><th>Added By</th><th>Date</th>
        <th>Type</th><th>Status</th><th>Action</th>
      </tr></thead>
      <tbody id="bl-tbody"><tr><td colspan="11" style="padding:30px;text-align:center;color:var(--text3)">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Add Manual Modal -->
<div class="modal-ov" id="add-modal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box">
    <div class="modal-hd">
      <span style="font-size:14px;font-weight:800">🚫 Add to Blacklist</span>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="fg"><label>Customer Name</label><input type="text" id="bl-name" placeholder="Full name"></div>
      <div class="fg"><label>Phone Number *</label><input type="tel" id="bl-phone" placeholder="10-digit mobile"></div>
      <div class="fg"><label>Email ID</label><input type="email" id="bl-email" placeholder="customer@email.com"></div>
      <div class="fg"><label>Task ID (if any)</label><input type="text" id="bl-taskid" placeholder="ID-2026-0001"></div>
      <div class="fg" style="grid-column:1/-1"><label>Reason *</label>
        <textarea id="bl-reason" rows="3" placeholder="Why is this customer being blacklisted?"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:10px;padding:0 16px 16px">
      <button class="btn" style="flex:1;background:var(--surface2);color:var(--text);border:1.5px solid var(--border)" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-red" style="flex:2" onclick="addManual()">🚫 Add to Blacklist</button>
    </div>
  </div>
</div>

<!-- Clear Modal -->
<div class="modal-ov" id="clear-modal" onclick="if(event.target===this)closeClearModal()">
  <div class="modal-box">
    <div class="modal-hd">
      <span style="font-size:14px;font-weight:800">✅ Clear from Blacklist</span>
      <button class="modal-close" onclick="closeClearModal()">✕</button>
    </div>
    <div style="padding:16px">
      <div id="clear-info" style="background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px"></div>
      <div class="fg">
        <label>Reason for clearing *</label>
        <textarea id="clear-reason" rows="3" placeholder="e.g. Customer agreed to pay full amount, Written confirmation received…"></textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn" style="flex:1;background:var(--surface2);color:var(--text);border:1.5px solid var(--border)" onclick="closeClearModal()">Cancel</button>
        <button class="btn" style="flex:2;background:var(--green);color:#fff" onclick="confirmClear()">✅ Clear from Blacklist</button>
      </div>
    </div>
  </div>
</div>

<div id="bl-toast"></div>

<script>
const API = 'api/index.php';
const AUTH_TOKEN = (()=>{
  const p = new URLSearchParams(window.location.search);
  return p.get('token') || localStorage.getItem('bgps_token') || '';
})();

async function blApi(action, params={}, method='GET', body=null){
  let url = API+'?action='+action;
  if(method==='GET') url += '&'+new URLSearchParams(params);
  const opts = {method, headers:{'X-Auth-Token': AUTH_TOKEN}};
  if(body){ opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  const r = await fetch(url, opts);
  return r.json();
}

function toast(msg){
  const el=document.getElementById('bl-toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

let _clearId = null;
let _allEntries = [];

// ── LOAD ──────────────────────────────────────────────────────
async function loadBlacklist(){
  document.getElementById('bl-tbody').innerHTML = '<tr><td colspan="11" style="padding:30px;text-align:center;color:var(--text3)">Loading…</td></tr>';
  const search = document.getElementById('bl-search').value.trim();
  const status = document.getElementById('bl-status').value;
  const res = await blApi('get_blacklist', {search, status}).catch(()=>({}));
  if(res.error){ document.getElementById('bl-tbody').innerHTML=`<tr><td colspan="11" style="padding:30px;text-align:center;color:var(--red)">❌ ${res.error}</td></tr>`; return; }
  _allEntries = res.entries || [];

  // Stats
  const allRes = await blApi('get_blacklist', {status:'all'}).catch(()=>({}));
  const all = allRes.entries || [];
  document.getElementById('bl-stat-active').textContent  = all.filter(e=>e.status==='active').length;
  document.getElementById('bl-stat-auto').textContent    = all.filter(e=>e.status==='active'&&e.task_id).length;
  document.getElementById('bl-stat-cleared').textContent = all.filter(e=>e.status==='cleared').length;

  if(!_allEntries.length){
    document.getElementById('bl-tbody').innerHTML='<tr><td colspan="11" style="padding:30px;text-align:center;color:var(--text3)">No entries found</td></tr>';
    return;
  }
  document.getElementById('bl-tbody').innerHTML = _allEntries.map((e,i)=>{
    const date = e.added_at ? new Date(e.added_at).toLocaleDateString('en-IN') : '–';
    const type = e.task_id ? '<span class="badge-auto">Auto</span>' : '<span class="badge-manual">Manual</span>';
    const stat = e.status==='active' ? '<span class="badge-active">Active</span>' : '<span class="badge-cleared">Cleared</span>';
    const reason = (e.reason||'–').length>50 ? e.reason.slice(0,50)+'…' : (e.reason||'–');
    return `<tr>
      <td>${i+1}</td>
      <td style="font-weight:700">${e.customer_name||'–'}</td>
      <td><a href="tel:${e.phone||''}" style="color:var(--accent);text-decoration:none;font-weight:700">${e.phone||'–'}</a></td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.email||'–'}</td>
      <td>${e.task_id ? `<span style="font-size:11px;font-weight:700;color:var(--accent)">${e.task_id}</span>` : '–'}</td>
      <td style="max-width:180px;color:var(--text2)">${reason}</td>
      <td style="white-space:nowrap">${e.added_by||'–'}</td>
      <td style="white-space:nowrap">${date}</td>
      <td>${type}</td>
      <td>${stat}</td>
      <td>
        ${e.status==='active'
          ? `<button class="btn btn-sm" style="background:var(--green-bg);color:var(--green);border:1.5px solid var(--green)" onclick="openClearModal(${e.id})">✅ Clear</button>`
          : `<span style="font-size:11px;color:var(--text3)">${e.cleared_by||'–'}</span>`}
      </td>
    </tr>`;
  }).join('');
}

// ── ADD MANUAL ────────────────────────────────────────────────
function openAddModal(){ document.getElementById('add-modal').classList.add('open'); }
function closeAddModal(){ document.getElementById('add-modal').classList.remove('open'); }

async function addManual(){
  const phone  = document.getElementById('bl-phone').value.trim();
  const email  = document.getElementById('bl-email').value.trim();
  const reason = document.getElementById('bl-reason').value.trim();
  if(!phone && !email){ toast('⚠️ Phone or email required'); return; }
  if(!reason){ toast('⚠️ Reason required'); return; }
  const res = await blApi('add_blacklist',{},'POST',{
    customer_name: document.getElementById('bl-name').value.trim()||null,
    phone: phone||null, email: email||null,
    task_id: document.getElementById('bl-taskid').value.trim()||null,
    reason,
  }).catch(()=>({}));
  if(res.success){ toast('🚫 Added to blacklist'); closeAddModal(); loadBlacklist();
    ['bl-name','bl-phone','bl-email','bl-taskid','bl-reason'].forEach(id=>document.getElementById(id).value='');
  } else toast('❌ '+(res.error||'Failed'));
}

// ── CLEAR ─────────────────────────────────────────────────────
function openClearModal(id){
  _clearId = id;
  const e = _allEntries.find(x=>+x.id===+id);
  document.getElementById('clear-info').innerHTML = e
    ? `<b>Customer:</b> ${e.customer_name||'–'}<br><b>Phone:</b> ${e.phone||'–'}<br><b>Email:</b> ${e.email||'–'}<br><b>Reason blacklisted:</b> ${e.reason||'–'}`
    : '';
  document.getElementById('clear-reason').value='';
  document.getElementById('clear-modal').classList.add('open');
}
function closeClearModal(){ document.getElementById('clear-modal').classList.remove('open'); }

async function confirmClear(){
  const reason = document.getElementById('clear-reason').value.trim();
  if(!reason){ toast('⚠️ Please enter reason for clearing'); return; }
  const res = await blApi('clear_blacklist',{},'POST',{id:_clearId, reason}).catch(()=>({}));
  if(res.success){ toast('✅ Cleared from blacklist'); closeClearModal(); loadBlacklist(); }
  else toast('❌ '+(res.error||'Failed'));
}

// Auto-load
setTimeout(loadBlacklist, 300);
</script>
</body>
</html>
